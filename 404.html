<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Tapdzi</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #232544;
            --text: #e8e8f0;
            --muted: #9aa0c4;
            --primary: #5c6bc0;
            --border: rgba(121, 134, 203, 0.25);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 30%, rgba(121, 134, 203, 0.2), transparent 45%),
                var(--bg);
            padding: 24px;
        }
        .card {
            width: min(560px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3rem);
            line-height: 1.05;
        }
        p {
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
        }
        .actions {
            margin-top: 22px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        a {
            text-decoration: none;
            border-radius: 8px;
            padding: 11px 16px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .primary {
            background: var(--primary);
            color: #fff;
        }
        .secondary {
            border: 1px solid var(--border);
            color: var(--text);
            background: transparent;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>404</h1>
        <p>The page you tried to open does not exist.</p>
        <p>Let's get you back to the templates.</p>
        <div class="actions">
            <a class="primary" href="/">Back to Home</a>
            <a class="secondary" href="/#templates">Browse Templates</a>
        </div>
    </main>
</body>
</html>
